services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opticamilap.rule=Host(`opticamilap.com`) || Host(`www.opticamilap.com`)"
      - "traefik.http.routers.opticamilap.entrypoints=https"
      - "traefik.http.routers.opticamilap.tls=true"
      - "traefik.http.routers.opticamilap.tls.certresolver=letsencrypt"
      - "traefik.http.services.opticamilap.loadbalancer.server.port=80"
      - "traefik.http.routers.opticamilap-http.rule=Host(`opticamilap.com`) || Host(`www.opticamilap.com`)"
      - "traefik.http.routers.opticamilap-http.entrypoints=http"
      - "traefik.http.routers.opticamilap-http.middlewares=opticamilap-https"
      - "traefik.http.middlewares.opticamilap-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.opticamilap-https.redirectscheme.permanent=true"

networks:
  coolify:
    external: true
